nelmio_security:
  # prevents framing of the entire site
  clickjacking:
    paths:
      "^/.*": DENY

  # disables content type sniffing for script resources
  content_type:
    nosniff: true

  # Send a full URL in the `Referer` header when performing a same-origin request,
  # only send the origin of the document to secure destination (HTTPS->HTTPS),
  # and send no header to a less secure destination (HTTPS->HTTP).
  # If `strict-origin-when-cross-origin` is not supported, use `no-referrer` policy,
  # no referrer information is sent along with requests.
  referrer_policy:
    enabled: true
    policies:
      - "no-referrer"
      - "strict-origin-when-cross-origin"

  # Content Security Policy
  csp:
    enabled: true
    hosts: []
    content_types: []
    enforce:
      level1_fallback: false
      browser_adaptive: false
      default-src:
        - "self"
      script-src:
        - "self"
        - "unsafe-inline" # Pour Stimulus/Turbo
        - "https://unpkg.com" # Boxicons
      style-src:
        - "self"
        - "unsafe-inline" # Pour Tailwind
        - "https://unpkg.com" # Boxicons
        - "https://fonts.googleapis.com" # Google Fonts
      img-src:
        - "self"
        - "data:"
      font-src:
        - "self"
        - "https://unpkg.com" # Boxicons
        - "https://fonts.gstatic.com" # Google Fonts
      connect-src:
        - "self"
        - "http://localhost:3000" # Mercure hub
        - "http://127.0.0.1:3000" # Mercure hub (alternative)
      frame-ancestors:
        - "none"

  # Force HTTPS (HSTS) - Désactivé en dev, activé en prod
  forced_ssl:
    enabled: false # Mettre à true uniquement en production HTTPS
    hsts_max_age: 31536000 # 1 an
    hsts_subdomains: true
    hsts_preload: false
